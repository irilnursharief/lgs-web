<section class="bg-surface py-20">
    <div class="max-w-7xl mx-auto px-6">

        <!-- Overline -->
        <p class="text-center font-semibold tracking-[0.05em] uppercase
                  text-on-surface-variant mb-12"
           style="font-size: 0.75rem;">
            Brands We've Built For
        </p>

        <!-- Client Wordmarks -->
        <div class="flex flex-wrap items-center justify-center gap-y-6">
            {% for client in clients %}

                <span class="font-bold hover:text-on-surface transition-colors duration-200 px-10 text-center"
                    style="font-size: 0.9375rem; letter-spacing: 0.02em; color: #AAAAAA;">
                    {{ client.name }}
                </span>

                <!-- Divider between items, not after last -->
                {% if not forloop.last %}
                <span class="text-surface-container font-light"
                      style="font-size: 1.5rem;">
                    /
                </span>
                {% endif %}

            {% endfor %}
        </div>

    </div>
</section>
