<section class="bg-surface-container-low py-24">
    <!-- Visitor Cursor -->
    <div id="carousel-cursor"
        class="fixed pointer-events-none z-50 hidden items-center justify-center
                bg-on-surface text-white rounded-full font-semibold"
        style="width: 72px; height: 72px; font-size: 0.75rem;
                transform: translate(-50%, -50%); transition: transform 0.1s ease;">
        DRAG
    </div>

    <div class="max-w-7xl mx-auto px-6 mb-12">
        <span class="text-primary-container font-semibold tracking-[0.05em] uppercase"
              style="font-size: 0.75rem;">
            What Our Clients Say
        </span>
    </div>

    <!-- Outer wrapper — clips overflow, respects page margin -->
    <div class="max-w-7xl mx-auto px-6 overflow-hidden">

        <!-- Inner track — this is what moves -->
        <div id="testimonial-track"
             class="flex gap-6 cursor-grab overflow-hidden"
             style="scrollbar-width: none; -ms-overflow-style: none;">

            {% for t in testimonials %}
            <div class="bg-surface-container-lowest rounded-lg p-10 shrink-0 flex flex-col"
                 style="width: 540px;
                        box-shadow: 0px 20px 40px rgba(25, 28, 30, 0.06);">

                <!-- Header -->
                <div class="flex items-start justify-between mb-8">
                    <div class="flex items-center gap-1">
                        {% for i in "12345" %}
                        <svg class="w-5 h-5" viewBox="0 0 20 20" fill="#F97316"
                             xmlns="http://www.w3.org/2000/svg">
                            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07
                                     3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588
                                     1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3
                                     .921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0
                                     00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539
                                     -1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98
                                     8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0
                                     00.951-.69l1.07-3.292z"/>
                        </svg>
                        {% endfor %}
                    </div>
                    <span class="font-serif font-bold select-none"
                          style="font-size: 5rem; color: #ECEEF0; line-height: 1;">
                        "
                    </span>
                </div>

                <!-- Quote -->
                <blockquote class="italic text-on-surface mb-10 flex-1"
                            style="font-size: 1.125rem; line-height: 1.6;">
                    "{{ t.quote }}"
                </blockquote>

                <!-- Attribution -->
                <div class="flex items-center gap-4 mt-auto">
                    <img src="{{ t.avatar }}"
                         alt="{{ t.name }}"
                         class="w-12 h-12 rounded-md object-cover">
                    <div>
                        <p class="font-bold text-on-surface"
                           style="font-size: 0.9375rem;">
                            {{ t.name }}
                        </p>
                        <p class="text-on-surface-variant"
                           style="font-size: 0.8125rem;">
                            {{ t.title }}
                        </p>
                    </div>
                </div>

            </div>
            {% endfor %}

        </div>

    </div>

</section>
