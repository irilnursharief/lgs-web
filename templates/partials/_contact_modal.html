<!-- Contact Modal -->
<div id="contact-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" aria-modal="true"
    role="dialog">

    <!-- Backdrop -->
    <div id="modal-backdrop" class="absolute inset-0"
        style="background: rgba(25, 28, 30, 0.6); backdrop-filter: blur(4px);">
    </div>

    <!-- Modal Card -->
    <div class="relative bg-surface-container-lowest rounded-lg w-full max-w-lg
                flex flex-col" style="box-shadow: 0px 20px 40px rgba(25, 28, 30, 0.15); max-height: 90vh;">

        <!-- Modal Header -->
        <div class="flex items-start justify-between p-8 pb-6">
            <div>
                <p class="text-primary-container font-semibold tracking-[0.05em] uppercase mb-2"
                    style="font-size: 0.75rem;">
                    Let's Talk
                </p>
                <h2 class="font-extrabold text-on-surface" style="font-size: 1.75rem; letter-spacing: -0.02em;">
                    Start a Project
                </h2>
            </div>
            <!-- Close button -->
            <button id="modal-close" class="cursor-pointer text-on-surface-variant hover:text-on-surface
                           transition-colors duration-200 mt-1" aria-label="Close modal">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>

        <!-- Form -->
        <div class="overflow-y-auto px-8 pb-8">
            <form id="contact-form" novalidate>
                {% csrf_token %}
                <div class="flex flex-col gap-5">

                    <!-- Full Name -->
                    <div class="flex flex-col gap-1.5">
                        <label class="font-semibold text-on-surface" style="font-size: 0.8125rem;">
                            Full Name <span class="text-primary-container">*</span>
                        </label>
                        <input type="text" name="full_name" placeholder="Juan dela Cruz" class="w-full px-0 py-2 bg-transparent text-on-surface
                                      placeholder-on-surface-variant outline-none
                                      border-b border-surface-container
                                      focus:border-primary-container
                                      transition-colors duration-200" style="font-size: 0.9375rem;">
                        <span class="error-msg text-red-500 hidden" style="font-size: 0.75rem;"
                            data-field="full_name"></span>
                    </div>

                    <!-- Work Email -->
                    <div class="flex flex-col gap-1.5">
                        <label class="font-semibold text-on-surface" style="font-size: 0.8125rem;">
                            Work Email <span class="text-primary-container">*</span>
                        </label>
                        <input type="email" name="work_email" placeholder="juan@company.com" class="w-full px-0 py-2 bg-transparent text-on-surface
                                      placeholder-on-surface-variant outline-none
                                      border-b border-surface-container
                                      focus:border-primary-container
                                      transition-colors duration-200" style="font-size: 0.9375rem;">
                        <span class="error-msg text-red-500 hidden" style="font-size: 0.75rem;"
                            data-field="work_email"></span>
                    </div>

                    <!-- Company + Phone row -->
                    <div class="grid grid-cols-2 gap-4">
                        <!-- Company Name -->
                        <div class="flex flex-col gap-1.5">
                            <label class="font-semibold text-on-surface" style="font-size: 0.8125rem;">
                                Company <span class="text-primary-container">*</span>
                            </label>
                            <input type="text" name="company_name" placeholder="Your Company Inc." class="w-full px-0 py-2 bg-transparent text-on-surface
                                          placeholder-on-surface-variant outline-none
                                          border-b border-surface-container
                                          focus:border-primary-container
                                          transition-colors duration-200" style="font-size: 0.9375rem;">
                            <span class="error-msg text-red-500 hidden" style="font-size: 0.75rem;"
                                data-field="company_name"></span>
                        </div>

                        <!-- Phone -->
                        <div class="flex flex-col gap-1.5">
                            <label class="font-semibold text-on-surface" style="font-size: 0.8125rem;">
                                Phone
                                <span class="text-on-surface-variant font-normal">
                                    (Optional)
                                </span>
                            </label>
                            <input type="text" name="phone_number" placeholder="+63 912 345 6789" class="w-full px-0 py-2 bg-transparent text-on-surface
                                          placeholder-on-surface-variant outline-none
                                          border-b border-surface-container
                                          focus:border-primary-container
                                          transition-colors duration-200" style="font-size: 0.9375rem;">
                        </div>
                    </div>

                    <!-- Service Interest -->
                    <div class="flex flex-col gap-1.5">
                        <label class="font-semibold text-on-surface" style="font-size: 0.8125rem;">
                            Service Interest <span class="text-primary-container">*</span>
                        </label>
                        <select name="service_interest" class="w-full px-0 py-2 bg-transparent text-on-surface
                                       outline-none border-b border-surface-container
                                       focus:border-primary-container
                                       transition-colors duration-200 cursor-pointer" style="font-size: 0.9375rem;">
                            <option value="">Select a service...</option>
                            <option value="web_development">Web & System Development</option>
                            <option value="it_consultation">IT Consultation</option>
                            <option value="digital_transformation">Digital Transformation</option>
                            <option value="other">Other</option>
                        </select>
                        <span class="error-msg text-red-500 hidden" style="font-size: 0.75rem;"
                            data-field="service_interest"></span>
                    </div>

                    <!-- Message -->
                    <div class="flex flex-col gap-1.5">
                        <label class="font-semibold text-on-surface" style="font-size: 0.8125rem;">
                            Message <span class="text-primary-container">*</span>
                        </label>
                        <textarea name="message" rows="4" placeholder="Tell us about your project..." class="w-full px-0 py-2 bg-transparent text-on-surface
                                         placeholder-on-surface-variant outline-none
                                         border-b border-surface-container
                                         focus:border-primary-container
                                         transition-colors duration-200 resize-none"
                            style="font-size: 0.9375rem;"></textarea>
                        <span class="error-msg text-red-500 hidden" style="font-size: 0.75rem;"
                            data-field="message"></span>
                    </div>

                    <!-- Submit -->
                    <button type="submit" id="submit-btn" class="w-full font-semibold py-4 rounded-md
                                   transition-all duration-200
                                   hover:opacity-90 hover:scale-[1.01]
                                   flex items-center justify-center gap-2 cursor-pointer" style="background: linear-gradient(135deg, #F97316, #9D4300);
                                   color: #FFFFFF; font-size: 0.9375rem;">
                        Send Message
                    </button>

                </div>
            </form>

            <!-- Success message (hidden by default) -->
            <div id="success-msg" class="hidden text-center py-4">
                <p class="font-bold text-on-surface mb-1" style="font-size: 1.125rem;">
                    Message Sent! 🎉
                </p>
                <p class="text-on-surface-variant" style="font-size: 0.875rem;">
                    We'll get back to you within 24 hours.
                </p>
            </div>

        </div>

    </div>
</div>
